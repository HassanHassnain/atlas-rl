model:
  id: Qwen/Qwen3-4B-Instruct-2507
  load_in_4bit: true
  attn_implementation: null
  init_adapter: misc/checkpoints/qwen3_family/sft_oracle_qwen3_4b_instruct_2507/final

lora:
  enabled: false

dataset:
  path: misc/data/generated/train.jsonl
  # Match the validated Qwen2.5 continuation: long log_triage incidents are
  # already strong and exceed this GRPO run's fixed prompt-length budget.
  envs:
    - ci_doctor
    - config_repair
    - cron_author
    - dockerfile_lint
    - k8s_doctor
    - regex_extract
    - runbook_planner
    - semver_resolve
    - shell_golf

output_dir: misc/checkpoints/qwen3_family/grpo_stable_qwen3_4b_instruct_2507

train:
  max_steps: 20
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  num_generations: 2
  learning_rate: 1.0e-6
  beta: 0.20
  temperature: 0.7
  top_p: 0.95
  max_prompt_length: 1280
  max_completion_length: 256
  gradient_checkpointing: false
  logging_steps: 5
  save_steps: 10
  seed: 17
