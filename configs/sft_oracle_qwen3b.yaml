# Deterministic oracle curriculum before GRPO.
model:
  id: Qwen/Qwen2.5-3B-Instruct

dataset:
  path: data/generated/train.jsonl
  envs: null

oracle:
  max_prompts: 3000

sft_dataset: data/generated/sft_oracle_3b.jsonl
output_dir: checkpoints/sft_oracle_3b

lora:
  r: 64
  alpha: 128
  dropout: 0.05

train:
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  max_length: 2048
  gradient_checkpointing: true
  logging_steps: 20
  save_steps: 400
  seed: 17
