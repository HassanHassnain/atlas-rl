# SFT-from-rejection-sampling baseline (de-risking ablation). RUNTIME-ONLY.
model:
  id: Qwen/Qwen2.5-3B-Instruct

dataset:
  path: data/generated/train.jsonl
  envs: null

sample:
  backend: "hf:Qwen/Qwen2.5-3B-Instruct"   # sample from the BASE model
  k: 2                                      # tries per prompt
  temperature: 0.9
  max_new_tokens: 384
  max_prompts: 100                          # stratified equally across all envs

sft_dataset: data/generated/sft_rs_3b.jsonl
output_dir: checkpoints/sft_rs_3b

lora:
  r: 32
  alpha: 64
  dropout: 0.05

train:
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  max_length: 2048
  gradient_checkpointing: true
  logging_steps: 5
  save_steps: 200
  seed: 17
